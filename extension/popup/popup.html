<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --primary: #1a1a1a;
      --secondary: #666;
      --accent: #0047ab;
      --bg-light: #f8f8f8;
      --border: #e0e0e0;
      --ai-red: #8b0000;
      --uncertain-orange: #d2691e;
      --human-green: #006400;
    }

    body {
      width: 400px;
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      font-size: 13px;
      color: var(--primary);
      padding: 16px;
      background: white;
    }

    h1 {
      font-size: 16px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 2px;
      padding-bottom: 4px;
    }

    .subtitle {
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--secondary);
      border-bottom: 2px solid var(--primary);
      padding-bottom: 12px;
      margin-bottom: 16px;
      opacity: 0.8;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border);
      margin-bottom: 14px;
      border: 1px solid var(--border);
    }

    .stat-card {
      background: white;
      padding: 12px;
      text-align: left;
    }

    .stat-value { font-size: 20px; font-weight: 800; font-family: 'Courier New', monospace; }
    .stat-label { font-size: 10px; color: var(--secondary); text-transform: uppercase; margin-top: 2px; }

    .section-title {
      font-weight: 700;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin: 16px 0 8px 0;
      padding-bottom: 2px;
      border-bottom: 1px solid var(--border);
    }

    /* Platform Cards */
    .platform-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .platform-card {
      background: white;
      border: 1px solid var(--border);
      padding: 10px;
    }

    .platform-header {
      font-weight: 800;
      font-size: 11px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .platform-stat-row {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      padding: 2px 0;
    }

    .platform-empty {
      font-size: 10px;
      color: #999;
      padding: 10px 0;
    }

    .platform-breakdown {
      display: flex;
      flex-wrap: wrap;
      gap: 2px;
      margin-top: 8px;
    }

    .tag {
      font-size: 9px;
      padding: 2px 4px;
      font-weight: 600;
      text-transform: uppercase;
      border: 1px solid transparent;
    }

    .tag-ai { background: white; color: var(--ai-red); border-color: var(--ai-red); }
    .tag-uncertain { background: white; color: var(--uncertain-orange); border-color: var(--uncertain-orange); }
    .tag-human { background: white; color: var(--human-green); border-color: var(--human-green); }

    /* Meter */
    .meter-bar {
      height: 4px;
      background: #eee;
      margin: 8px 0;
    }

    .meter-fill {
      height: 100%;
      transition: width 0.4s ease;
    }

    /* Breakdown */
    .breakdown-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .breakdown-label { font-size: 11px; text-transform: uppercase; color: var(--secondary); }

    .breakdown-count {
      font-size: 11px;
      font-weight: 700;
      font-family: monospace;
    }

    /* Recent Posts */
    .recent-post {
      padding: 8px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .recent-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }

    .recent-author { font-weight: 700; font-size: 11px; color: var(--primary); }

    .recent-score {
      font-size: 10px;
      font-weight: 800;
      font-family: monospace;
      padding: 1px 4px;
      border: 1px solid var(--border);
    }

    .recent-text {
      font-size: 11px;
      color: #333;
      line-height: 1.4;
      font-style: italic;
    }

    /* Buttons */
    .btn-row {
      display: flex;
      gap: 1px;
      margin-top: 16px;
      background: var(--primary);
      border: 1px solid var(--primary);
    }

    button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 0;
      font-size: 11px;
      cursor: pointer;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn-export { background: var(--primary); color: white; }
    .btn-clear { background: white; color: var(--primary); }
    button:hover { background: var(--secondary); color: white; }

    .empty-state {
      text-align: center;
      padding: 40px 10px;
      color: #999;
      text-transform: uppercase;
      font-size: 10px;
      letter-spacing: 1px;
    }

    .engagement-row {
      font-size: 9px;
      color: #777;
      margin-top: 4px;
      text-transform: uppercase;
    }

    /* Scanner Toggle */
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      margin-bottom: 16px;
      border-bottom: 2px solid var(--primary);
    }

    .toggle-label {
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--primary);
    }

    .toggle-controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .toggle-status {
      font-size: 10px;
      font-weight: 800;
      font-family: monospace;
      padding: 3px 10px;
      border: 1px solid;
    }

    .toggle-status.active {
      color: var(--human-green);
      border-color: var(--human-green);
      background: rgba(16, 185, 129, 0.05);
    }

    .toggle-status.paused {
      color: var(--ai-red);
      border-color: var(--ai-red);
      background: rgba(239, 68, 68, 0.05);
    }

    .toggle-btn {
      flex: none !important; /* Block global flex:1 */
      padding: 6px 16px !important;
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      border: 1px solid var(--primary) !important;
      background: white;
      color: var(--primary);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .toggle-btn:hover {
      background: var(--primary);
      color: white;
    }
  </style>
</head>
<body>
  <h1>🔍 AI Content Detector</h1>
  <div class="subtitle">Active monitoring for LinkedIn and X</div>
  <div id="content" class="empty-state">Loading...</div>

  <script src="popup.js"></script>
</body>
</html>
